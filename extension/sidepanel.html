<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Human Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Public+Sans:wght@400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      color: #173447;
      background: linear-gradient(180deg, #fbf7ef 0%, #f5efe4 100%);
      min-height: 100vh;
    }

    .container { padding: 20px; max-width: 100%; }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.6rem;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #375d75;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #173447, #264f69);
      color: white;
      font: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: wait; }

    .url-display {
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(23, 52, 71, 0.12);
      font-size: 0.8rem;
      color: #375d75;
      word-break: break-all;
      margin-bottom: 16px;
    }

    .status {
      text-align: center;
      padding: 40px 20px;
      color: #375d75;
      font-size: 0.9rem;
    }

    .loading-bar {
      height: 3px;
      border-radius: 3px;
      background: rgba(23, 52, 71, 0.1);
      overflow: hidden;
      margin: 16px 0;
    }

    .loading-bar-inner {
      height: 100%;
      width: 40%;
      border-radius: 3px;
      background: #7bb4ad;
      animation: slide 1.5s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .guide { margin-top: 20px; }

    .guide h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin: 20px 0 8px;
    }

    .guide p, .guide li {
      font-size: 0.85rem;
      line-height: 1.6;
      color: #375d75;
    }

    .guide ul, .guide ol {
      padding-left: 18px;
    }

    .guide li { margin-bottom: 4px; }

    .callout {
      margin: 8px 0;
      padding: 10px 12px;
      border-left: 3px solid #f26430;
      background: rgba(242, 100, 48, 0.05);
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #375d75;
    }

    .callout strong { color: #173447; }

    .audio-section {
      margin: 16px 0;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(123,180,173,0.12), rgba(255,250,242,0.9));
      border: 1px solid rgba(123,180,173,0.25);
    }

    .audio-section p {
      font-size: 0.8rem;
      color: #375d75;
      margin-bottom: 8px;
    }

    audio { width: 100%; height: 36px; }

    .error {
      padding: 12px;
      border-radius: 12px;
      background: rgba(242, 100, 48, 0.08);
      color: #972800;
      font-size: 0.85rem;
      margin: 12px 0;
    }

    .lang-select {
      margin-bottom: 12px;
    }

    .lang-select select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(23, 52, 71, 0.15);
      background: white;
      font: inherit;
      font-size: 0.8rem;
      color: #173447;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <h1>Human Mode</h1>
    <p class="subtitle">Calm guide for this page</p>
    <div id="content">
      <p class="subtitle">Click the button to analyze this page.</p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
